<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale:1">
    <title> georgesippgames</title>
    <link rel="stylesheet" href="/css/styles.css">

    <script src="/js/slideshow.js" defer></script>
    

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">

</head>
<body>

    

    


<header style="display:flex; align-items:center;">

    <a href="/" style="flex:0 0 auto;">
        <img src="https://websitebilder.b-cdn.net/giants/slug.gif" alt="Slug" style="height:50px; width:auto; max-width:100%; display:block;">
    </a>

    <div style="flex:1 1 auto; display:flex; justify-content:center; min-width:0;">
        <a href="/">
            <img src="https://websitebilder.b-cdn.net/giants/georgesippgames_splashscreen4_sm.png" alt="GeorgeSippGames Logo"
             style="max-height:50px; width:auto; max-width:100%; display:block;">
        </a>
    </div>

</header>
    <main>
    <div class="game-container">
  <div style="display: grid;
  grid-template-rows: 2;
  place-items: center; gap: 24px;">
  <div class="game-layout">
    <div class="game-sidebar">
      <img class="mySlides" src="https://websitebilder.b-cdn.net/giants/giants_screenshot%20(1).png">
      </img>
      <img class="mySlides" src="https://websitebilder.b-cdn.net/giants/giants_screenshot%20(2).png">
      </img>
      <img class="mySlides" src="https://websitebilder.b-cdn.net/giants/giants_screenshot%20(3).png">
      </img>
      <img class="mySlides" src="https://websitebilder.b-cdn.net/giants/giants_screenshot%20(4).png">
      </img>
      <img class="mySlides" src="https://websitebilder.b-cdn.net/giants/giants_screenshot%20(5).png">
      </img>
      <img class="mySlides" src="https://websitebilder.b-cdn.net/giants/giants_screenshot%20(6).png">
      </img>
      <img class="mySlides" src="https://websitebilder.b-cdn.net/giants/giants_screenshot%20(7).png">
      </img>
      <img class="mySlides" src="https://websitebilder.b-cdn.net/giants/giants_screenshot%20(8).png">
      </img>
      <img class="mySlides" src="https://websitebilder.b-cdn.net/giants/giants_screenshot%20(9).png">
      </img>
    </div>
    <div class="game-main">
      <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/ejgy31yyM40?si=8I552oTDC5dmesHP"
          title="YouTube video player"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
          class="custom-video">
        </iframe>
      </div>
    </div>
  </div>
  <div class="widget-wrapper">
    <!-- Your Steam widget/iframe goes here -->
    <iframe class="steam-widget" src="https://store.steampowered.com/widget/4476360/" 
            frameborder="0" >
    </iframe>
  </div>
  <script src="/js/widget-scale.js"></script>
</div>

    </main>
    <footer>
    <p>&copy; 2026 GeorgeSippGames. All rights reserved.</p>
</footer>
</body>
</html>
